name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.10', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e .

      - name: Verify import
        run: python -c "import recon_pipes; print(f'recon-pipes v{recon_pipes.__version__}')"

      - name: Verify CLI
        run: recon-pipes --help

      - name: Validate examples
        run: |
          recon-pipes validate examples/basic-recon.yaml
          recon-pipes validate examples/full-recon.yaml
